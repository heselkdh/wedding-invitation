<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>청첩장 관리자</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<!-- 로그인 화면 -->
<div id="login-screen">
  <div class="login-box">
    <h1>🌸 청첩장 관리자</h1>
    <p>관리자 계정으로 로그인하세요</p>
    <input type="email" id="login-email" placeholder="이메일">
    <input type="password" id="login-pw" placeholder="비밀번호">
    <button class="btn btn-primary btn-full" id="login-btn">로그인</button>
    <p id="login-error" style="color:#c0392b;font-size:0.8rem;margin-top:12px;display:none;"></p>
  </div>
</div>

<!-- 관리자 화면 -->
<div id="admin-screen">
  <header>
    <h1>🌸 청첩장 관리자</h1>
    <button class="btn btn-ghost" id="logout-btn">로그아웃</button>
  </header>

  <div class="admin-container">

    <!-- 패널 1: 기본 정보 -->
    <div class="panel" id="panel-info">
      <div class="panel-header" onclick="togglePanel('panel-info')">
        <h2>✏️ 기본 정보</h2>
        <span class="toggle-icon">▾</span>
      </div>
      <div class="panel-body">
        <div class="form-row">
          <div>
            <label>신랑 이름</label>
            <input type="text" id="groomName" placeholder="홍길동">
          </div>
          <div>
            <label>신부 이름</label>
            <input type="text" id="brideName" placeholder="김영희">
          </div>
        </div>
        <div class="form-row">
          <div>
            <label>신랑 측 혼주 (쉼표로 구분)</label>
            <input type="text" id="groomParents" placeholder="아버지 홍○○,어머니 이○○">
          </div>
          <div>
            <label>신부 측 혼주 (쉼표로 구분)</label>
            <input type="text" id="brideParents" placeholder="아버지 김○○,어머니 박○○">
          </div>
        </div>
        <div class="form-row">
          <div>
            <label>결혼식 날짜</label>
            <input type="date" id="weddingDate">
          </div>
          <div>
            <label>결혼식 시간 (예: 오후 2시 30분)</label>
            <input type="text" id="weddingTime" placeholder="오후 2시 30분">
          </div>
        </div>
        <label>오프닝 애니메이션 문구 (손글씨 스타일로 표시)</label>
        <input type="text" id="splashText" placeholder="Save the Date">
        <label>예식장 이름</label>
        <input type="text" id="venueName" placeholder="○○웨딩홀 ○층 ○○홀">
        <label>예식장 주소</label>
        <input type="text" id="venueAddress" placeholder="서울시 ○○구 ○○로 00">
        <label>카카오맵 URL</label>
        <input type="text" id="kakaoMapUrl" placeholder="https://kko.kakao.com/...">
        <label>배경음악 유튜브 URL</label>
        <input type="text" id="musicUrl" placeholder="https://www.youtube.com/watch?v=...">
        <label>교통편 안내 (HTML 가능)</label>
        <textarea id="transport" placeholder="<h4>🚇 지하철</h4><p>○호선 ○○역</p>"></textarea>
        <label>링크 미리보기 썸네일 (카카오톡 공유 시 표시)</label>
        <div id="og-thumb-preview" style="margin-bottom:10px;display:none;">
          <img id="og-thumb-preview-img" src="" alt="썸네일" style="max-width:100%;border-radius:8px;border:1px solid #e0e0e0;">
        </div>
        <label class="upload-area" id="og-thumb-upload-area">
          <span style="font-size:1.5rem;">🖼️</span>
          <p>클릭하여 썸네일 이미지 업로드 (1200×630 권장)</p>
          <input type="file" id="og-thumb-input" accept="image/*">
        </label>
        <p id="og-thumb-progress" style="font-size:0.8rem;color:#8a6a76;margin-bottom:8px;"></p>
        <div id="og-thumb-url-wrap" style="display:none;margin-bottom:16px;">
          <p style="font-size:0.75rem;color:#8a6a76;margin-bottom:6px;">현재 썸네일 URL</p>
          <div style="display:flex;gap:8px;align-items:center;">
            <input type="text" id="og-thumb-url-display" readonly style="font-size:0.75rem;color:#444;background:#f5f5f5;margin-bottom:0;">
            <button class="btn btn-ghost" id="og-thumb-copy-btn" style="white-space:nowrap;flex-shrink:0;">복사</button>
          </div>
          <a href="https://developers.kakao.com/tool/clear/og" target="_blank" rel="noopener"
             style="display:inline-block;margin-top:10px;font-size:0.8rem;color:#b5546a;text-decoration:underline;">
            🔄 카카오 OG 캐시 초기화 (새탭)
          </a>
        </div>

        <label>QR 코드 (종이 청첩장 인쇄용)</label>
        <button class="btn btn-primary" id="qr-generate-btn" type="button">🔗 QR 코드 생성</button>
        <div id="qr-preview-wrap" style="display:none;margin-top:12px;margin-bottom:16px;">
          <canvas id="qr-canvas" style="display:block;width:240px;height:240px;border:1px solid #e8dde2;border-radius:8px;"></canvas>
          <a id="qr-download-link" download="wedding-qr.png"
             style="display:inline-block;margin-top:10px;font-size:0.8rem;color:#b5546a;text-decoration:underline;">
            💾 PNG 다운로드
          </a>
        </div>

        <label>인트로 제목 (예: 소중한 분들을 초대합니다)</label>
        <input type="text" id="introTitle" placeholder="소중한 분들을 초대합니다">
        <label>인트로 본문 (Enter로 줄바꿈)</label>
        <textarea id="introText" placeholder="겉에 있을 때&#10;가장 나다운 모습이 되게 하는 사람..." style="min-height:120px;"></textarea>

        <label>첫 화면 배경 이미지</label>
        <div id="hero-bg-preview" style="margin-bottom:10px;display:none;">
          <img id="hero-bg-preview-img" src="" alt="배경" style="max-width:100%;border-radius:8px;border:1px solid #e8dde2;">
          <button class="btn btn-danger" id="hero-bg-delete-btn" style="margin-top:8px;">🗑️ 배경 삭제</button>
        </div>
        <label class="upload-area" id="hero-bg-upload-area">
          <span style="font-size:1.5rem;">🖼️</span>
          <p>클릭하여 첫 화면 배경 이미지 업로드</p>
          <input type="file" id="hero-bg-input" accept="image/*">
        </label>
        <p id="hero-bg-progress" style="font-size:0.8rem;color:#8a6a76;margin-bottom:16px;"></p>

        <label>약도 이미지</label>
        <div id="map-image-preview" style="margin-bottom:10px;display:none;">
          <img id="map-preview-img" src="" alt="약도" style="max-width:100%;border-radius:8px;border:1px solid #e8dde2;">
          <button class="btn btn-danger" id="map-image-delete-btn" style="margin-top:8px;">🗑️ 약도 삭제</button>
        </div>
        <label class="upload-area" id="map-upload-area">
          <span style="font-size:1.5rem;">🗺️</span>
          <p>클릭하여 약도 이미지 업로드</p>
          <input type="file" id="map-image-input" accept="image/*">
        </label>
        <p id="map-upload-progress" style="font-size:0.8rem;color:#8a6a76;"></p>
        <button class="btn btn-primary" id="save-info-btn">저장</button>
      </div>
    </div>

    <!-- 패널 2: 사진 관리 -->
    <div class="panel collapsed" id="panel-photos">
      <div class="panel-header" onclick="togglePanel('panel-photos')">
        <h2>📸 사진 관리</h2>
        <span class="toggle-icon">▾</span>
      </div>
      <div class="panel-body">
        <div class="photo-grid" id="photo-grid"></div>
        <button class="btn btn-primary" id="save-photo-order-btn" style="display:none;width:100%;justify-content:center;margin-bottom:12px;">💾 순서 저장</button>
        <label class="upload-area" id="upload-area">
          <span style="font-size:2rem;">+</span>
          <p>클릭하여 사진 추가 (여러 장 가능)</p>
          <input type="file" id="photo-input" accept="image/*" multiple>
        </label>
        <p id="upload-progress" style="font-size:0.8rem;color:#8a6a76;"></p>
      </div>
    </div>

    <!-- 패널 3: 계좌번호 -->
    <div class="panel collapsed" id="panel-accounts">
      <div class="panel-header" onclick="togglePanel('panel-accounts')">
        <h2>💳 계좌번호</h2>
        <span class="toggle-icon">▾</span>
      </div>
      <div class="panel-body">
        <p style="font-size:0.8rem;color:#8a6a76;margin-bottom:16px;">💍 신랑</p>
        <div class="form-row">
          <div><label>은행명</label><input type="text" id="groomBank" placeholder="국민은행"></div>
          <div><label>예금주</label><input type="text" id="groomHolder" placeholder="홍길동"></div>
        </div>
        <label>계좌번호</label>
        <input type="text" id="groomAccount" placeholder="000-0000-0000-00">

        <p style="font-size:0.8rem;color:#8a6a76;margin:16px 0 8px;">👨 신랑 측 혼주 (아버지)</p>
        <div class="form-row">
          <div><label>은행명</label><input type="text" id="groomFatherBank" placeholder="국민은행"></div>
          <div><label>예금주</label><input type="text" id="groomFatherHolder" placeholder="홍○○"></div>
        </div>
        <label>계좌번호</label>
        <input type="text" id="groomFatherAccount" placeholder="000-0000-0000-00">

        <p style="font-size:0.8rem;color:#8a6a76;margin:16px 0 8px;">👩 신랑 측 혼주 (어머니)</p>
        <div class="form-row">
          <div><label>은행명</label><input type="text" id="groomMotherBank" placeholder="국민은행"></div>
          <div><label>예금주</label><input type="text" id="groomMotherHolder" placeholder="이○○"></div>
        </div>
        <label>계좌번호</label>
        <input type="text" id="groomMotherAccount" placeholder="000-0000-0000-00">

        <p style="font-size:0.8rem;color:#8a6a76;margin:20px 0 8px;">💍 신부</p>
        <div class="form-row">
          <div><label>은행명</label><input type="text" id="brideBank" placeholder="신한은행"></div>
          <div><label>예금주</label><input type="text" id="brideHolder" placeholder="김영희"></div>
        </div>
        <label>계좌번호</label>
        <input type="text" id="brideAccount" placeholder="000-0000-0000-00">

        <p style="font-size:0.8rem;color:#8a6a76;margin:16px 0 8px;">👨 신부 측 혼주 (아버지)</p>
        <div class="form-row">
          <div><label>은행명</label><input type="text" id="brideFatherBank" placeholder="신한은행"></div>
          <div><label>예금주</label><input type="text" id="brideFatherHolder" placeholder="김○○"></div>
        </div>
        <label>계좌번호</label>
        <input type="text" id="brideFatherAccount" placeholder="000-0000-0000-00">

        <p style="font-size:0.8rem;color:#8a6a76;margin:16px 0 8px;">👩 신부 측 혼주 (어머니)</p>
        <div class="form-row">
          <div><label>은행명</label><input type="text" id="brideMotherBank" placeholder="신한은행"></div>
          <div><label>예금주</label><input type="text" id="brideMotherHolder" placeholder="박○○"></div>
        </div>
        <label>계좌번호</label>
        <input type="text" id="brideMotherAccount" placeholder="000-0000-0000-00">

        <button class="btn btn-primary" id="save-accounts-btn">저장</button>
      </div>
    </div>

    <!-- 패널 4: 방명록 관리 -->
    <div class="panel collapsed" id="panel-guestbook">
      <div class="panel-header" onclick="togglePanel('panel-guestbook')">
        <h2>🗑️ 방명록 관리</h2>
        <span class="toggle-icon">▾</span>
      </div>
      <div class="panel-body">
        <div id="guestbook-admin-list">
          <p style="color:#8a6a76;font-size:0.85rem;">방명록을 불러오는 중...</p>
        </div>
      </div>
    </div>

  </div><!-- /admin-container -->
</div>

<div id="toast"></div>

<script type="module" src="js/admin.js?v=2"></script>
</body>
</html>
